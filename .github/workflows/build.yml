name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-libgpioman:
    name: Build libgpioman
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libgpioman-1.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install C build dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            autoconf automake libtool build-essential

      - name: Configure
        run: ./configure --prefix="$RUNNER_TEMP/libgpioman"

      - name: Build
        run: make -j"$(nproc)"

      - name: Install into CI staging directory
        run: make install

  build-server:
    name: Build server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python sources
        run: python -m compileall -q .

  build-web-page:
    name: Build web page
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-page/app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: web-page/app/.nvmrc
          cache: npm
          cache-dependency-path: web-page/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build -- --configuration production
